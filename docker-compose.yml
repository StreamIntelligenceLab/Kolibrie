version: '3.8'

services:
  kolibrie:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_TAG: "22.04"
        ENABLE_WEB_UI: "true"
    image: kolibrie:cpu
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./models:/app/ml/examples/models
      - ./web:/app/web
    environment:
      - RUST_LOG=info
      - PYTHONPATH=/app/ml/src:/app/python/target/release
    command: /app/target/release/kolibrie-http-server
    profiles:
      - cpu
      - default

  kolibrie-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_TAG: ${BASE_TAG:-22.04}
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:22.04}
        ENABLE_WEB_UI: "false"
    image: kolibrie:dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./models:/app/ml/examples/models
      - ./web:/app/web
    working_dir: /app
    environment:
      - RUST_LOG=debug
      - PYTHONPATH=/app/ml/src:/app/python/target/release
    command: bash
    profiles:
      - dev
